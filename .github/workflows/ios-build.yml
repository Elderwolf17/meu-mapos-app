name: Flutter iOS IPA Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-13
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        architecture: x64

    - name: Install Dependencies
      run: |
        flutter pub get
        cd ios
        pod install --repo-update
        cd ..

    - name: Build IPA (Unsigned)
      run: |
        flutter build ipa --no-codesign

    - name: Prepare Asset
      run: |
        mkdir -p build/ios/iphoneos_out
        mv build/ios/ipa/*.ipa build/ios/iphoneos_out/MapOS-Unsigned.ipa || true

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MapOS-iOS-IPA
        path: build/ios/iphoneos_out/MapOS-Unsigned.ipa
        if-no-files-found: error
